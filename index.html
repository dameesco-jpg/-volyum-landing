<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLYUM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Archivo Black', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            height: 100vh;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: 1;
            object-fit: cover;
        }

        /* Dark overlay for better text visibility */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 2;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.6) 100%);
            }
            50% {
                background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.5) 100%);
            }
        }

        /* Main content container */
        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Logo Container */
        .logo-container {
            position: relative;
            width: 60vw;
            max-width: 600px;
            margin-bottom: 3rem;
            opacity: 0;
            animation: logoReveal 2s ease-out 0.3s forwards;
        }

        @keyframes logoReveal {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 15px 80px rgba(123, 44, 191, 0.9))
                    drop-shadow(0 5px 40px rgba(0, 0, 0, 0.8))
                    drop-shadow(0 0 100px rgba(255, 255, 255, 0.3));
            animation: logoFloat 5s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Tagline */
        .tagline {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            text-align: center;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #00ffff 50%, #e91e63 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: taglineReveal 1.5s ease-out 0.8s forwards;
            line-height: 1.4;
            position: relative;
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.5);
            padding: 0 2rem;
        }

        .tagline::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #7b2cbf 0%, #e91e63 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: -1;
            filter: blur(20px);
            opacity: 0.6;
        }

        @keyframes taglineReveal {
            from {
                opacity: 0;
                transform: translateY(30px);
                letter-spacing: 0.4em;
            }
            to {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: 0.2em;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .logo-container {
                width: 70vw;
                max-width: 400px;
                margin-bottom: 2rem;
            }

            .tagline {
                font-size: clamp(0.9rem, 3.5vw, 1.8rem);
                letter-spacing: 0.15em;
                padding: 0 1rem;
            }
        }

        /* Add a subtle vignette effect */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.8);
            z-index: 3;
            pointer-events: none;
        }

        /* Glitch effect on logo hover */
        .logo-container:hover img {
            animation: logoFloat 5s ease-in-out infinite, glitch 0.5s ease;
        }

        @keyframes glitch {
            0%, 100% { 
                transform: translateY(0) translateX(0);
                filter: drop-shadow(0 15px 80px rgba(123, 44, 191, 0.9))
                        drop-shadow(0 5px 40px rgba(0, 0, 0, 0.8))
                        drop-shadow(0 0 100px rgba(255, 255, 255, 0.3));
            }
            10% { 
                transform: translateY(0) translateX(-5px);
                filter: drop-shadow(0 15px 80px rgba(255, 0, 255, 1))
                        drop-shadow(5px 5px 40px rgba(0, 255, 255, 0.8));
            }
            20% { 
                transform: translateY(0) translateX(5px);
                filter: drop-shadow(0 15px 80px rgba(0, 255, 255, 1))
                        drop-shadow(-5px 5px 40px rgba(255, 0, 255, 0.8));
            }
            30% { 
                transform: translateY(0) translateX(-3px);
            }
            40% { 
                transform: translateY(0) translateX(3px);
            }
            50% { 
                transform: translateY(0) translateX(0);
            }
        }

        /* Noise texture overlay for grunge effect */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            opacity: 0.05;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            animation: footerReveal 1s ease-out 2s forwards;
        }

        @keyframes footerReveal {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .partners {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        .partners .separator {
            color: rgba(255, 255, 255, 0.3);
        }

        .copyright {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Responsive footer */
        @media (max-width: 768px) {
            .footer {
                padding: 1.5rem 1rem;
            }

            .partners {
                font-size: 0.65rem;
                gap: 1rem;
            }

            .copyright {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <video class="video-background" autoplay loop muted playsinline>
        <source src="disco-ball.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Overlays -->
    <div class="video-overlay"></div>
    <div class="vignette"></div>
    <div class="noise-overlay"></div>

    <!-- Main Content -->
    <div class="content-wrapper">
        <div class="logo-container">
            <img src="volyum-logo.png" alt="VOLYUM">
        </div>

        <h1 class="tagline" data-text="FUELED BY ARTISTS. POWERED BY BRANDS.">
            FUELED BY ARTISTS.<br>
            POWERED BY BRANDS.
        </h1>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="partners">
            <span>Powered by Havas</span>
            <span class="separator">•</span>
            <span>Art of Sound</span>
        </div>
        <div class="copyright">
            © VOLYUM 2026. All Rights Reserved.
        </div>
    </div>

    <script>
        // Ensure video plays on load
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('.video-background');
            video.play().catch(err => {
                console.log('Video autoplay failed:', err);
            });
        });

        // Add subtle parallax effect based on mouse position
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            
            const logo = document.querySelector('.logo-container');
            logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>
</html>
